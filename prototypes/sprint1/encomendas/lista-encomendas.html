<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Encomendas — SmartDelivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/style.css">
  <style>
    .pagination-container {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pagination-info {
      font-size: 13px;
      color: var(--text-muted);
    }
    .pagination-controls {
      display: flex;
      gap: 8px;
    }
    .filter-card {
      padding: 24px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="7" fill="#01696f"/>
      <path d="M7 14l5 5 9-9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    SmartDelivery
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a href="#" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <div class="nav-section">Gestão</div>
    <a href="#" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </a>
    <a href="#" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
      Estafetas
    </a>
    <a href="#" class="nav-item active">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V10"/><path d="M23 4H1v6h22V4z"/><line x1="12" y1="4" x2="12" y2="10"/></svg>
      Encomendas
    </a>
  </nav>
</aside>

<header class="topbar">
  <div>
    <div class="topbar-title">Encomendas</div>
    <div class="breadcrumb">Gestão › <span>Lista de Encomendas</span></div>
  </div>
  <div class="topbar-actions">
    <a href="criar-encomendas.html" class="btn btn-primary btn-sm">+ Nova Encomenda</a>
    <div class="user-avatar">GR</div>
  </div>
</header>

<main class="main">

  <!-- Filtros (US11) -->
  <div class="card filter-card">
    <div class="section-label">Filtros</div>
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="Pesquisar por ID ou cliente...">
      </div>
      <select id="filtro-estado" class="filter-select">
        <option value="">Todos os estados</option>
        <option value="Pendente">Pendente</option>
        <option value="Em distribuição">Em distribuição</option>
        <option value="Entregue">Entregue</option>
        <option value="Cancelada">Cancelada</option>
      </select>
      <input type="date" id="filtro-data-inicio" class="filter-select" value="2026-04-01">
      <span>a</span>
      <input type="date" id="filtro-data-fim" class="filter-select" value="2026-04-20">
      <button class="btn btn-primary btn-sm" onclick="aplicarFiltros()">Filtrar</button>
      <button class="btn btn-secondary btn-sm" onclick="limparFiltros()">Limpar</button>
    </div>
  </div>

  <!-- Lista de Encomendas -->
  <div class="card" style="padding:0; overflow:auto;">
    <table class="table" id="tabela-encomendas">
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Morada de Entrega</th>
          <th>Estado</th>
          <th>Data de Criação</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="corpo-tabela">
        <!-- Preenchido via JS -->
      </tbody>
    </table>
    <div class="pagination-container">
      <span class="pagination-info" id="paginacao-info">1-5 de 23 encomendas</span>
      <div class="pagination-controls" id="paginacao-controls">
        <a href="#" class="btn btn-secondary btn-sm" onclick="paginaAnterior(); return false;">← Anterior</a>
        <a href="#" class="btn btn-primary btn-sm">1</a>
        <a href="#" class="btn btn-secondary btn-sm">2</a>
        <a href="#" class="btn btn-secondary btn-sm">3</a>
        <a href="#" class="btn btn-secondary btn-sm" onclick="proximaPagina(); return false;">Seguinte →</a>
      </div>
    </div>
  </div>

</main>

<script>
  // Dados mockados
  const encomendas = [
    { id: '#1021', cliente: 'João Silva', morada: 'Rua A, 10, 1000-001 Lisboa', estado: 'Pendente', data: '2026-04-20 09:30' },
    { id: '#1020', cliente: 'Marta Costa', morada: 'Av. Liberdade, 200, 1250-002 Lisboa', estado: 'Em distribuição', data: '2026-04-20 08:15' },
    { id: '#1019', cliente: 'Empresa XYZ, Lda.', morada: 'Rua da Prata, 55, 1100-003 Lisboa', estado: 'Entregue', data: '2026-04-19 14:20' },
    { id: '#1018', cliente: 'Carlos Santos', morada: 'Rua Augusta, 12, 1100-004 Lisboa', estado: 'Cancelada', data: '2026-04-18 11:05' },
    { id: '#1017', cliente: 'Ana Ferreira', morada: 'Rua Garrett, 30, 1200-005 Lisboa', estado: 'Pendente', data: '2026-04-17 16:45' },
    { id: '#1016', cliente: 'Pedro Alves', morada: 'Rua de São Bento, 45, 1200-006 Lisboa', estado: 'Em distribuição', data: '2026-04-16 10:20' },
    { id: '#1015', cliente: 'Sofia Martins', morada: 'Rua do Ouro, 80, 1100-007 Lisboa', estado: 'Entregue', data: '2026-04-15 09:10' },
    { id: '#1014', cliente: 'Miguel Sousa', morada: 'Rua da Alfândega, 22, 1100-008 Lisboa', estado: 'Pendente', data: '2026-04-14 13:30' },
  ];

  let paginaAtual = 1;
  const itensPorPagina = 5;
  let encomendasFiltradas = [...encomendas];

  function aplicarFiltros() {
    const estadoFiltro = document.getElementById('filtro-estado').value;
    const dataInicio = document.getElementById('filtro-data-inicio').value;
    const dataFim = document.getElementById('filtro-data-fim').value;
    const pesquisa = document.querySelector('.search-input').value.toLowerCase();

    encomendasFiltradas = encomendas.filter(enc => {
      if (estadoFiltro && enc.estado !== estadoFiltro) return false;
      if (dataInicio && enc.data.split(' ')[0] < dataInicio) return false;
      if (dataFim && enc.data.split(' ')[0] > dataFim) return false;
      if (pesquisa && !(enc.id.toLowerCase().includes(pesquisa) || enc.cliente.toLowerCase().includes(pesquisa))) return false;
      return true;
    });

    paginaAtual = 1;
    renderizarTabela();
  }

  function limparFiltros() {
    document.getElementById('filtro-estado').value = '';
    document.querySelector('.search-input').value = '';
    document.getElementById('filtro-data-inicio').value = '2026-04-01';
    document.getElementById('filtro-data-fim').value = '2026-04-20';
    encomendasFiltradas = [...encomendas];
    paginaAtual = 1;
    renderizarTabela();
  }

  function renderizarTabela() {
    const corpo = document.getElementById('corpo-tabela');
    const inicio = (paginaAtual - 1) * itensPorPagina;
    const fim = Math.min(inicio + itensPorPagina, encomendasFiltradas.length);
    const paginaDados = encomendasFiltradas.slice(inicio, fim);

    corpo.innerHTML = '';
    paginaDados.forEach(enc => {
      const tr = document.createElement('tr');
      let badgeClass = '';
      if (enc.estado === 'Pendente') badgeClass = 'badge-warning';
      else if (enc.estado === 'Em distribuição') badgeClass = 'badge-info';
      else if (enc.estado === 'Entregue') badgeClass = 'badge-success';
      else if (enc.estado === 'Cancelada') badgeClass = 'badge-error';

      tr.innerHTML = `
        <td><strong>${enc.id}</strong></td>
        <td>${enc.cliente}</td>
        <td>${enc.morada}</td>
        <td><span class="badge ${badgeClass}">${enc.estado}</span></td>
        <td>${enc.data}</td>
        <td class="table-actions">
          <a href="detalhe-encomendas" class="btn btn-secondary btn-sm">Ver</a>
        </td>
      `;
      corpo.appendChild(tr);
    });

    // Atualizar info de paginação
    const total = encomendasFiltradas.length;
    document.getElementById('paginacao-info').textContent = `${inicio+1}-${fim} de ${total} encomendas`;

    // Atualizar controles de paginação (simplificado)
    const controlsDiv = document.getElementById('paginacao-controls');
    const totalPaginas = Math.ceil(total / itensPorPagina);
    let html = '';
    html += `<a href="#" class="btn btn-secondary btn-sm" onclick="paginaAnterior(); return false;" ${paginaAtual === 1 ? 'style="pointer-events:none; opacity:0.5;"' : ''}>← Anterior</a>`;
    for (let i = 1; i <= totalPaginas; i++) {
      html += `<a href="#" class="btn ${i === paginaAtual ? 'btn-primary' : 'btn-secondary'} btn-sm" onclick="irParaPagina(${i}); return false;">${i}</a>`;
    }
    html += `<a href="#" class="btn btn-secondary btn-sm" onclick="proximaPagina(); return false;" ${paginaAtual === totalPaginas ? 'style="pointer-events:none; opacity:0.5;"' : ''}>Seguinte →</a>`;
    controlsDiv.innerHTML = html;
  }

  function irParaPagina(pag) {
    paginaAtual = pag;
    renderizarTabela();
  }
  function paginaAnterior() {
    if (paginaAtual > 1) {
      paginaAtual--;
      renderizarTabela();
    }
  }
  function proximaPagina() {
    const totalPaginas = Math.ceil(encomendasFiltradas.length / itensPorPagina);
    if (paginaAtual < totalPaginas) {
      paginaAtual++;
      renderizarTabela();
    }
  }

  // Inicializar
  renderizarTabela();
</script>
</body>
</html>
