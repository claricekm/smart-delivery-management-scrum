<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Registar Cliente</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

<div class="main">
    <div class="page-header">
        <div>
            <h2 class="page-title">Registar Cliente</h2>
            <p class="page-subtitle">Formulário de criação de cliente</p>
        </div>
    </div>

    <div class="card">
        <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-input" placeholder="Introduza o nome do cliente">
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" placeholder="email@exemplo.com">
        </div>

        <div class="form-group">
            <label class="form-label">Contacto</label>
            <input type="text" class="form-input" placeholder="Número de telefone">
        </div>

        <div class="form-group">
            <label class="form-label">Tipo de Cliente</label>
            <select class="form-select">
                <option>Particular</option>
                <option>Empresa</option>
            </select>
        </div>

        <div class="form-actions">
            <button class="btn btn-primary">Registar</button>
        </div>
    </div>
</div>

</body>
</html>
